<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSync - Registro de Usuario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-indigo-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-3xl font-bold">EduSync</h1>
            <p class="text-indigo-100 mt-2">Crea tu cuenta institucional</p>
        </div>

        <form id="registerForm" class="p-8 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tipo de Usuario</label>
                <select id="rol" name="rol" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition" required>
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Tutor / Docente</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nombre(s)</label>
                    <input type="text" id="nombres" name="nombres" placeholder="Ej. Juan" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Apellido(s)</label>
                    <input type="text" id="apellidos" name="apellidos" placeholder="Ej. Pérez" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" name="email" placeholder="usuario@gmail.com" 
                    pattern=".+@gmail\.com" title="Debe ser una cuenta @gmail.com"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Matrícula (9 dígitos)</label>
                <input type="text" id="matricula" name="matricula" placeholder="123456789" 
                    pattern="\d{9}" maxlength="9" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                <p class="text-[10px] text-gray-400 mt-1">Solo números, exactamente 9 dígitos.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <div class="relative">
                    <input type="password" id="password" name="password" placeholder="••••••••" 
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" required>
                    <button type="button" onclick="togglePassword()" class="absolute right-3 top-2.5 text-gray-400 hover:text-indigo-600">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg transform transition active:scale-95">
                Registrarse Ahora
            </button>

            <div class="flex items-center my-4">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="px-3 text-gray-400 text-sm">o también</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button type="button" class="w-full flex items-center justify-center gap-3 border border-gray-300 py-2 rounded-lg hover:bg-gray-50 transition text-gray-700">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5" alt="Google">
                Registrarse con Google
            </button>
        </form>

        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-sm text-gray-600">¿Ya tienes cuenta? <a href="/" class="text-indigo-600 font-bold hover:underline">Inicia Sesión</a></p>
        </div>
    </div>

    <script>
        // Función para ver/ocultar contraseña
        function togglePassword() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Envío de datos real al servidor
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Recopilar datos
            const formData = {
                rol: document.getElementById('rol').value,
                nombres: document.getElementById('nombres').value,
                apellidos: document.getElementById('apellidos').value,
                email: document.getElementById('email').value,
                matricula: document.getElementById('matricula').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert("¡Éxito! Usuario creado. Serás redirigido al login.");
                    window.location.href = '/';
                } else {
                    alert("Error en el registro: " + result.msg);
                }
            } catch (error) {
                console.error("Error:", error);
                alert("No se pudo conectar con el servidor.");
            }
        });
    </script>
</body>
</html>
