<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EduSync - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-indigo-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-indigo-600">EduSync</h1>
            <p class="text-gray-500 mt-2">Bienvenido de nuevo</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700">Correo Institucional</label>
                <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="tu@gmail.com" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <div class="relative">
                    <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="••••••••" required>
                    <button type="button" onclick="togglePass()" class="absolute right-3 top-2.5 text-gray-400">
                        <i id="eye" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
                Entrar
            </button>

            <div class="relative flex py-3 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-gray-400 text-sm">o</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <button type="button" class="w-full flex items-center justify-center gap-3 border py-2 rounded-lg hover:bg-gray-50 transition text-gray-600 font-medium">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" class="w-5">
                Iniciar sesión con Google
            </button>
        </form>

        <p class="mt-8 text-center text-sm text-gray-600">
            ¿No tienes cuenta? <a href="/register_page" class="text-indigo-600 font-bold hover:underline">Regístrate aquí</a>
        </p>
    </div>

    <script>
        function togglePass() {
            const p = document.getElementById('password');
            const i = document.getElementById('eye');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.classList.toggle('fa-eye');
            i.classList.toggle('fa-eye-slash');
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (res.ok) {
                window.location.href = '/dashboard';
            } else {
                alert(result.msg);
            }
        };
    </script>
</body>
</html>
